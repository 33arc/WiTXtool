name: WiTXtool CI Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake
        # We tell CMake to ignore the high version requirement just in case
        run: |
          cmake -B build `
                -DCMAKE_BUILD_TYPE=Release `
                -DZLIB_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WiTXtool-Binary
          path: build/Release/WiTXtool.exe
